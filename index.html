<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DOU JAM Countdown</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  height:100vh;
  overflow:hidden;
  color:white;
  background: radial-gradient(circle at top,#1a0f08,#000);
  font-family:'Montserrat',sans-serif;
}

/* TOP BRAND */
.brand{
  position:absolute;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  letter-spacing:6px;
  font-size:13px;
  opacity:.6;
}

/* MENU */
.menu-btn{
  position:absolute;
  top:20px;
  right:20px;
  font-size:28px;
  cursor:pointer;
  color:#ff7a00;
  z-index:1000;
}

.menu{
  position:absolute;
  top:0;
  right:-360px;
  width:360px;
  height:100%;
  background:rgba(10,10,10,.95);
  backdrop-filter:blur(14px);
  padding:25px;
  transition:.4s;
  border-left:1px solid rgba(255,122,0,.25);
}

.menu.active{right:0;}

.menu h2{color:#ff7a00;}

.menu input,.menu select{
  width:100%;
  padding:10px;
  margin:6px 0 10px;
  border-radius:10px;
  border:1px solid rgba(255,122,0,.2);
  background:#111;
  color:#fff;
}

.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

button{
  border:none;
  border-radius:10px;
  padding:10px;
  font-weight:800;
  cursor:pointer;
  color:#fff;
}

.start{background:linear-gradient(135deg,#ff7a00,#ff3d00);}
.pause{background:#444;}
.reset{background:#222;border:1px solid rgba(255,122,0,.3);width:100%;margin-top:10px;}

/* CENTER */
.center{
  position:absolute;
  top:45%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

/* TITLE (ÜSTE ALINDI + DAHA PREMIUM) */
.title{
  font-size:40px;
  font-weight:900;
  margin-bottom:12px;
  text-shadow:0 0 20px rgba(255,122,0,.5);
}

/* TIMER */
.timer{
  font-family:'Bebas Neue',sans-serif;
  font-size:120px;
  color:#ff7a00;
  text-shadow:0 0 30px rgba(255,122,0,.6);
}

/* FOX (BÜYÜTÜLDÜ) */
.fox{
  width:360px;
  margin-bottom:10px;
  filter:drop-shadow(0 0 35px rgba(255,122,0,.4));
  animation:float 4s ease-in-out infinite;
}

/* ANİMASYONLAR GERİ */
.shake{animation:shake .15s infinite;}
.zoom{animation:zoom .3s ease-in-out infinite alternate;}
.pulse{animation:pulse .6s infinite;}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-18px);}
}

@keyframes pulse{
  0%{transform:scale(1);filter:brightness(1);}
  50%{transform:scale(1.12);filter:brightness(1.7);}
  100%{transform:scale(1);filter:brightness(1);}
}

@keyframes shake{
  0%{transform:translate(-50%,-50%) translate(0,0);}
  25%{transform:translate(-50%,-50%) translate(6px,-4px);}
  50%{transform:translate(-50%,-50%) translate(-6px,4px);}
  75%{transform:translate(-50%,-50%) translate(4px,6px);}
  100%{transform:translate(-50%,-50%) translate(-4px,-6px);}
}

@keyframes zoom{
  0%{transform:translate(-50%,-50%) scale(1);}
  100%{transform:translate(-50%,-50%) scale(1.03);}
}

/* LOGOS */
.logos{
  position:absolute;
  bottom:20px;
  right:20px;
  display:flex;
  gap:12px;
}

.logos img{
  width:55px;
  height:55px;
  object-fit:contain;
}

/* OVERLAY */
.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.9);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

.overlay h1{
  font-size:60px;
  color:#ff7a00;
  font-family:'Bebas Neue',sans-serif;
}
</style>
</head>

<body>

<div class="brand">DOU JAM</div>
<div class="menu-btn" onclick="toggleMenu()">☰</div>

<div class="menu" id="menu">
  <h2>Kontrol Paneli</h2>

  <label>Sayaç Adı</label>
  <input id="titleInput"/>

  <label>Mod</label>
  <select id="mode">
    <option value="duration">Süre</option>
    <option value="clock">Saat'e kadar</option>
  </select>

  <div id="durationBox">
    <label>Saat</label><input id="hourInput" type="number"/>
    <label>Dakika</label><input id="minuteInput" type="number"/>
    <label>Saniye</label><input id="secondInput" type="number"/>
  </div>

  <div id="clockBox" style="display:none">
    <label>Hedef Saat</label>
    <input id="targetTime" placeholder="14:30"/>
  </div>

  <div class="btn-row">
    <button class="start" onclick="startTimer()">Başlat</button>
    <button class="pause" onclick="pauseTimer()">Duraklat</button>
  </div>

  <button class="reset" onclick="resetTimer()">Sıfırla</button>
</div>

<div class="center" id="center">
  <div class="title" id="title">Etkinlik</div>
  <img src="tilki.png" class="fox" id="fox"/>
  <div class="timer" id="timer">00:00:00</div>
</div>

<div class="logos">
  <img src="logo1.png"/>
  <img src="logo2.png"/>
</div>

<div class="overlay" id="overlay">
  <h1>SÜRE BİTTİ</h1>
</div>

<script>
let interval,timeLeft=0,running=false,beepCtx,lastBeep=-1;

const menu=document.getElementById("menu");
const mode=document.getElementById("mode");
const center=document.getElementById("center");
const fox=document.getElementById("fox");
const timer=document.getElementById("timer");
const titleEl=document.getElementById("title");

const durationBox=document.getElementById("durationBox");
const clockBox=document.getElementById("clockBox");

function toggleMenu(){menu.classList.toggle("active");}

mode.onchange=()=>{
  durationBox.style.display=mode.value==="duration"?"block":"none";
  clockBox.style.display=mode.value==="clock"?"block":"none";
};

function initAudio(){
  if(!beepCtx) beepCtx=new (window.AudioContext||window.webkitAudioContext)();
  if(beepCtx.state==="suspended") beepCtx.resume();
}

function beep(){
  const o=beepCtx.createOscillator();
  const g=beepCtx.createGain();
  o.type="square";
  o.frequency.value=900;
  g.gain.value=0.05;
  o.connect(g);g.connect(beepCtx.destination);
  o.start();
  o.stop(beepCtx.currentTime+0.08);
}

function getDuration(){
  return (+hourInput.value||0)*3600 + (+minuteInput.value||0)*60 + (+secondInput.value||0);
}

function getClock(){
  let t=targetTime.value.split(":");
  let now=new Date();
  let target=new Date();
  target.setHours(+t[0],+t[1],0,0);
  if(target<now) target.setDate(target.getDate()+1);
  return Math.floor((target-now)/1000);
}

function format(s){
  let h=Math.floor(s/3600);
  let m=Math.floor((s%3600)/60);
  let sec=s%60;
  return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0")+":"+String(sec).padStart(2,"0");
}

function startTimer(){
  initAudio();

  if(titleInput.value) titleEl.innerText=titleInput.value;

  if(!running){
    timeLeft = mode.value==="duration"?getDuration():getClock();
  }

  if(timeLeft<=0) return;

  clearInterval(interval);
  running=true;
  lastBeep=-1;

  interval=setInterval(()=>{
    timer.innerText=format(timeLeft);

    if(timeLeft<=10 && timeLeft>0 && timeLeft!==lastBeep){
      beep();
      lastBeep=timeLeft;

      center.classList.add("shake","zoom");
      fox.classList.add("pulse");
    }

    if(timeLeft<=0){
      clearInterval(interval);
      running=false;
      overlay.style.display="flex";
      confetti({particleCount:140,spread:110});
      return;
    }

    timeLeft--;
  },1000);

  toggleMenu();
}

function pauseTimer(){clearInterval(interval);running=false;}

function resetTimer(){
  clearInterval(interval);
  running=false;
  timeLeft=0;
  lastBeep=-1;
  timer.innerText="00:00:00";
  overlay.style.display="none";
  center.classList.remove("shake","zoom");
  fox.classList.remove("pulse");
}
</script>

</body>
</html>
