<script>
firebase.initializeApp(firebaseConfig);
const ref=firebase.database().ref("timerState");

const overlay=document.getElementById("overlay");
const timer=document.getElementById("timer");
const titleEl=document.getElementById("title");

function format(s){
s=Number(s||0);
let h=Math.floor(s/3600);
let m=Math.floor((s%3600)/60);
let sec=s%60;
return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0")+":"+String(sec).padStart(2,"0");
}

ref.on("value",snap=>{
const d=snap.val();
if(!d) return;

titleEl.innerText=d.title || "DOU JAM";

let t=Number(d.timeLeft || 0);
timer.innerText=format(t);

if(d.finished){
overlay.style.display="flex";
}else{
overlay.style.display="none";
}

if(t<=0 && d.running && !d.finished){
ref.update({finished:true, running:false});
confetti({particleCount:150,spread:120});
}
});

function closeOverlay(){
ref.update({finished:false});
}
</script>
