<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOU JAM DISPLAY</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;700;900&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{
margin:0;
background:#000;
color:white;
font-family:Montserrat;
overflow:hidden;
}

.center{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

.title{
font-size:42px;
font-weight:900;
color:#ff7a00;
}

.timer{
font-size:110px;
font-family:Bebas Neue;
color:#ff7a00;
}

.fox{width:320px;}

.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,.95);
display:none;
align-items:center;
justify-content:center;
flex-direction:column;
}

.overlay h1{
font-size:70px;
color:#ff7a00;
}

button{
margin-top:20px;
padding:12px 20px;
border:none;
background:#ff7a00;
color:black;
font-weight:900;
cursor:pointer;
}
</style>
</head>

<body>

<div class="center">
<div class="title" id="title">DOU JAM</div>
<img src="tilki.png" class="fox">
<div class="timer" id="timer">00:00:00</div>
</div>

<div class="overlay" id="overlay">
<h1>SÜRE BİTTİ</h1>
<button onclick="closeOverlay()">KAPAT</button>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
apiKey:"AIzaSyBEXfWs0B3qG5gjswJtvQbgminrBU4XzuE",
authDomain:"doujam-ed005.firebaseapp.com",
databaseURL:"https://doujam-ed005-default-rtdb.firebaseio.com",
projectId:"doujam-ed005"
};

firebase.initializeApp(firebaseConfig);
const ref = firebase.database().ref("timerState");

const titleEl=document.getElementById("title");
const timerEl=document.getElementById("timer");
const overlay=document.getElementById("overlay");

function format(s){
s=Number(s||0);
let h=Math.floor(s/3600);
let m=Math.floor((s%3600)/60);
let sec=s%60;
return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0")+":"+String(sec).padStart(2,"0");
}

ref.on("value",snap=>{
const d=snap.val();
if(!d) return;

titleEl.innerText=d.title||"DOU JAM";

let t=Number(d.timeLeft||0);
timerEl.innerText=format(t);

if(d.finished){
overlay.style.display="flex";
}

if(!d.finished){
overlay.style.display="none";
}

if(t<=0 && d.running){
ref.update({finished:true});
confetti({particleCount:150,spread:120});
}
});

function closeOverlay(){
ref.update({finished:false});
}
</script>

</body>
</html>
