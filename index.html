<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DOU JAM Display</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

/* ARKA PLAN VE DERİNLİK EFEKTLERİ */
body{
    height:100vh;
    overflow:hidden;
    color:white;
    /* Ana Gradyan */
    background:radial-gradient(circle at top, #1a0f08, #000);
    font-family:'Montserrat',sans-serif;
    position: relative;
}

/* 1. Sade Detay: Hafif Dijital Grid Dokusu */
body::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: 
        linear-gradient(rgba(255, 122, 0, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 122, 0, 0.03) 1px, transparent 1px);
    background-size: 50px 50px;
    z-index: 1;
}

/* 2. Sade Detay: Arkadan Yavaşça Geçen Işık Topları (Bokeh) */
.bokeh-layer {
    position: absolute;
    width: 100%;
    height: 100%;
    z-index: 2;
    pointer-events: none;
}
.bokeh {
    position: absolute;
    background: white;
    border-radius: 50%;
    opacity: 0;
    filter: blur(20px);
    animation: drift 20s linear infinite;
}
.bokeh:nth-child(1) { width: 100px; height: 100px; left: 10%; background: #ff7a00; animation-duration: 25s; animation-delay: -2s; }
.bokeh:nth-child(2) { width: 80px; height: 80px; left: 40%; background: #ffffff; animation-duration: 30s; animation-delay: -10s; }
.bokeh:nth-child(3) { width: 120px; height: 120px; left: 80%; background: #ff7a00; animation-duration: 20s; animation-delay: -5s; }

@keyframes drift {
    0% { transform: translateY(110vh); opacity: 0; }
    10% { opacity: 0.05; }
    90% { opacity: 0.05; }
    100% { transform: translateY(-20vh); opacity: 0; }
}

/* ANA İÇERİK KONTENYIRI (Tüm öğelerin üzerinde olmalı) */
#main-content {
    position: relative;
    width: 100%;
    height: 100%;
    z-index: 10; 
}

.brand{position:absolute;top:20px;left:50%;transform:translateX(-50%);letter-spacing:6px;font-size:16px;opacity:.6; font-weight: 700;}

.center{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);text-align:center; transition: all 0.5s ease;}
.title{font-size:45px;font-weight:900;margin-bottom:12px;text-shadow:0 0 20px rgba(255,122,0,.5);}
.timer{font-family:'Bebas Neue',sans-serif;font-size:140px;color:#ffffff;text-shadow:0 0 30px rgba(255,255,255,.3); transition: color 0.1s, transform 0.1s, text-shadow 0.1s;}
.fox{width:360px;margin-bottom:10px;animation:float 4s ease-in-out infinite;}

.color-warning { color: #ffeb3b !important; text-shadow:0 0 30px rgba(255,235,59,.5) !important; }
.color-danger { color: #ff3d00 !important; text-shadow:0 0 30px rgba(255,61,0,.5) !important; }

.paused-overlay { position:absolute; top:60%; left:50%; transform:translateX(-50%); font-size:24px; font-weight:800; color:#ff7a00; letter-spacing: 4px; opacity:0; transition: opacity 0.3s; background: rgba(0,0,0,0.6); padding: 10px 30px; border-radius: 50px; border: 1px solid #ff7a00; pointer-events: none;}
.is-paused .paused-overlay { opacity: 1; }
.is-paused .timer { opacity: 0.5; }

.marquee-container { 
    position:absolute; 
    top:80px; 
    width:100%; 
    background:rgba(255,122,0,0.15); 
    border-top:2px solid rgba(255,122,0,0.3); 
    border-bottom:2px solid rgba(255,122,0,0.3); 
    padding:15px 0; 
    overflow:hidden; 
    display:none; 
}
.marquee-content { 
    display: inline-block;
    font-size:32px; 
    font-weight:800; 
    color:#ffb74d; 
    white-space:nowrap; 
    animation: scrollMarquee 20s linear infinite; /* Biraz yavaşlattım okunsun diye */
}

@keyframes scrollMarquee {
    0% { transform: translateX(100vw); }
    100% { transform: translateX(-100%); }
}

.progress-bar-container { position:absolute; bottom:0; left:0; width:100%; height:8px; background:rgba(255,255,255,0.1); z-index: 20; }
.progress-bar-fill { height:100%; background:linear-gradient(90deg,#ff7a00,#ffeb3b); width:100%; transition: width 0.5s linear; }

@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-18px);}}

/* YENİ LOGO DÜZENİ VE BOYUTLANDIRMA */
.logo-container {
    position: absolute;
    bottom: 30px;
    width: 90px; /* Logoların kaplayacağı eşit kutu boyutu */
    height: 90px;
    display: flex;
    justify-content: center;
    align-items: center;
    /* Hafif kurumsal bir parlama efekti */
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 10px;
    box-shadow: 0 0 15px rgba(255,122,0,0.1);
}

.logo-container img {
    max-width: 100%;
    max-height: 100%;
    /* KRİTİK: Görseller farklı boyutta olsa da bu kod sayesinde 
       bozulmadan kutunun içine eşit şekilde sığarlar */
    object-fit: contain; 
}

.logo-left { left: 30px; }
.logo-right { right: 30px; }


/* BİTİŞ EKRANI */
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.96);display:none;align-items:center;justify-content:center;flex-direction:column; z-index:100;}

/* 3. Sade Detay: Bitişte Dijital Glitch (Parazit) Efekti */
.overlay h1{
    font-size:100px;
    color:#ff7a00;
    font-family:'Bebas Neue',sans-serif; 
    text-shadow: 0 0 50px #ff7a00; 
    animation: float 3s ease-in-out infinite, glitch 0.3s linear infinite;
    position: relative;
}

@keyframes glitch {
    0% { transform: translate(0); text-shadow: 0 0 50px #ff7a00; }
    20% { transform: translate(-3px, 3px); text-shadow: -2px 0 red; }
    40% { transform: translate(-3px, -3px); text-shadow: -2px 0 red; }
    60% { transform: translate(3px, 3px); text-shadow: 2px 0 blue; }
    80% { transform: translate(3px, -3px); text-shadow: 2px 0 blue; }
    100% { transform: translate(0); text-shadow: 0 0 50px #ff7a00; }
}

/* Başlangıç Ekranı */
#init-screen { position:fixed; inset:0; background:#000; z-index:999; display:flex; justify-content:center; align-items:center; cursor:pointer; }
#init-screen h2 { color:#fff; border: 2px solid #ff7a00; padding: 20px 40px; border-radius: 10px; font-family: 'Montserrat', sans-serif;}
</style>
</head>
<body>

<div id="init-screen" onclick="initSystem()">
    <h2>SİSTEMİ BAŞLAT (TAM EKRAN)</h2>
</div>

<div class="bokeh-layer">
    <div class="bokeh"></div>
    <div class="bokeh"></div>
    <div class="bokeh"></div>
</div>

<div id="main-content">
    <div class="brand">DOU JAM</div>

    <div class="marquee-container" id="marquee-box">
        <div class="marquee-content" id="marquee-text">DOU JAM Etkinliğine Hoş Geldiniz!</div>
    </div>

    <div class="center" id="center">
        <div class="title" id="title">Etkinlik</div>
        <img src="tilki.png" class="fox" id="fox"/>
        <div class="timer" id="timer">00:00:00</div>
        <div class="paused-overlay" id="paused-text">DURAKLATILDI</div>
    </div>

    <div class="progress-bar-container">
        <div class="progress-bar-fill" id="progress-bar"></div>
    </div>

    <div class="logo-container logo-left">
        <img src="logo1.png" alt="Logo 1" onerror="this.style.display='none'"/>
    </div>
    <div class="logo-container logo-right">
        <img src="logo2.png" alt="Logo 2" onerror="this.style.display='none'"/>
    </div>
</div>

<div class="overlay" id="overlay">
    <h1>SÜRE BİTTİ!</h1>
</div>

<audio id="sfx-tick" src="tick.mp3" preload="auto"></audio>
<audio id="sfx-finish" src="finish.mp3" preload="auto"></audio>
<audio id="sfx-notify" src="notify.mp3" preload="auto"></audio>

<script>
// FIREBASE CONFIG - Değişmedi
const firebaseConfig = {
    apiKey:"AIzaSyBEXfWs0B3qG5gjswJtvQbgminrBU4XzuE",
    authDomain:"doujam-ed005.firebaseapp.com",
    databaseURL:"https://doujam-ed005-default-rtdb.firebaseio.com",
    projectId:"doujam-ed005"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const ref = db.ref("timerState");

// DOM Elementleri - Değişmedi
const timerEl = document.getElementById("timer");
const titleEl = document.getElementById("title");
const overlay = document.getElementById("overlay");
const progressBar = document.getElementById("progress-bar");
const marqueeBox = document.getElementById("marquee-box");
const marqueeText = document.getElementById("marquee-text");
const initScreen = document.getElementById("init-screen");

// Ses Elementleri - Değişmedi
const sfxTick = document.getElementById("sfx-tick");
const sfxFinish = document.getElementById("sfx-finish");
const sfxNotify = document.getElementById("sfx-notify");

let state = { running: false, endTime: 0, pausedLeft: 0, totalDuration: 0, finished: false };
let lastSecond = -1;
let finishTriggered = false;
let confettiInterval; 

let serverOffset = 0;
db.ref(".info/serverTimeOffset").on("value", (snap) => {
    serverOffset = snap.val() || 0;
});

function getServerTime() {
    return Date.now() + serverOffset;
}

function initSystem() {
    initScreen.style.display = "none";
    if(document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen();
    }
    sfxTick.play().then(() => { sfxTick.pause(); sfxTick.currentTime = 0; }).catch(e=>{});
    sfxFinish.play().then(() => { sfxFinish.pause(); sfxFinish.currentTime = 0; }).catch(e=>{});
    sfxNotify.play().then(() => { sfxNotify.pause(); sfxNotify.currentTime = 0; }).catch(e=>{});
}

function format(ms) {
    if(ms < 0) ms = 0;
    let totalSec = Math.floor(ms / 1000);
    let h = Math.floor(totalSec / 3600);
    let m = Math.floor((totalSec % 3600) / 60);
    let s = totalSec % 60;
    return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
}

function randomInRange(min, max) {
    return Math.random() * (max - min) + min;
}

function fireConfetti() {
    var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 1000 };
    confetti(Object.assign({}, defaults, { particleCount: 50, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
    confetti(Object.assign({}, defaults, { particleCount: 50, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
}

ref.on("value", (snap) => {
    const data = snap.val();
    if(!data) return;
    
    if(state.message !== data.message && state.message !== undefined && data.showMarquee) {
        sfxNotify.play();
    }

    state = data;
    titleEl.innerText = state.title || "Etkinlik";
    
    if(state.showMarquee && state.message) {
        marqueeBox.style.display = "block";
        marqueeText.innerText = state.message;
    } else {
        marqueeBox.style.display = "none";
    }

    if(!state.running && state.pausedLeft > 0 && !state.finished) {
        document.body.classList.add("is-paused");
    } else {
        document.body.classList.remove("is-paused");
    }

    if(state.finished) {
        overlay.style.display = "flex";
        if(!finishTriggered) {
            sfxFinish.play();
            finishTriggered = true;
            fireConfetti(); 
            confettiInterval = setInterval(fireConfetti, 400); 
        }
    } else {
        overlay.style.display = "none";
        finishTriggered = false;
        clearInterval(confettiInterval); 
    }
});

function updateLoop() {
    let timeLeftMs = 0;

    if (state.running) {
        timeLeftMs = state.endTime - getServerTime(); 
    } else {
        timeLeftMs = state.pausedLeft;
    }

    if (timeLeftMs < 0) timeLeftMs = 0;

    let currentSecond = Math.floor(timeLeftMs / 1000);
    
    if(state.running && currentSecond > 0 && currentSecond <= 10 && currentSecond !== lastSecond) {
        sfxTick.currentTime = 0;
        sfxTick.play();
    }
    lastSecond = currentSecond;

    timerEl.innerText = format(timeLeftMs);

    if (state.running && timeLeftMs <= 0 && !state.finished) {
        ref.update({ running: false, finished: true, pausedLeft: 0 });
    }

    timerEl.className = "timer"; 
    if(timeLeftMs <= 60000 && timeLeftMs > 0 && state.running) {
        let intensity = (Math.sin(Date.now() / 200) + 1) / 2; 
        let blurAmount = 20 + (intensity * 50); 
        timerEl.style.textShadow = `0 0 ${blurAmount}px rgba(255, 61, 0, ${0.6 + (intensity * 0.4)})`;
        timerEl.style.color = `rgb(255, ${255 - (intensity * 100)}, ${255 - (intensity * 100)})`; 
        timerEl.style.transform = `scale(${1 + (intensity * 0.02)})`; 
    } 
    else if (currentSecond <= 600 && currentSecond > 0) {
        timerEl.style.textShadow = ""; 
        timerEl.style.color = "";
        timerEl.style.transform = "scale(1)";
        timerEl.classList.add("color-warning");
    } 
    else {
        timerEl.style.textShadow = "";
        timerEl.style.color = "";
        timerEl.style.transform = "scale(1)";
    }

    if(state.totalDuration > 0) {
        let percent = (timeLeftMs / state.totalDuration) * 100;
        progressBar.style.width = Math.min(100, Math.max(0, percent)) + "%";
    } else {
        progressBar.style.width = "0%";
    }

    requestAnimationFrame(updateLoop);
}

requestAnimationFrame(updateLoop);
</script>
</body>
</html>
