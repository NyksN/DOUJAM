<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DOU JAM Display</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@300;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{height:100vh;overflow:hidden;color:white;background:radial-gradient(circle at top,#1a0f08,#000);font-family:'Montserrat',sans-serif;}

.brand{position:absolute;top:20px;left:50%;transform:translateX(-50%);letter-spacing:6px;font-size:16px;opacity:.6; font-weight: 700;}

.center{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);text-align:center; transition: all 0.5s ease;}
.title{font-size:45px;font-weight:900;margin-bottom:12px;text-shadow:0 0 20px rgba(255,122,0,.5);}
.timer{font-family:'Bebas Neue',sans-serif;font-size:140px;color:#ffffff;text-shadow:0 0 30px rgba(255,255,255,.3); transition: color 0.5s;}
.fox{width:360px;margin-bottom:10px;animation:float 4s ease-in-out infinite;}

/* Renk Durumları */
.color-warning { color: #ffeb3b !important; text-shadow:0 0 30px rgba(255,235,59,.5) !important; }
.color-danger { color: #ff3d00 !important; text-shadow:0 0 30px rgba(255,61,0,.5) !important; }
.color-pulse { animation: pulseWarning 1s infinite; }

/* Duraklatıldı Arayüzü */
.paused-overlay { position:absolute; top:60%; left:50%; transform:translateX(-50%); font-size:24px; font-weight:800; color:#ff7a00; letter-spacing: 4px; opacity:0; transition: opacity 0.3s; background: rgba(0,0,0,0.6); padding: 10px 30px; border-radius: 50px; border: 1px solid #ff7a00; }
.is-paused .paused-overlay { opacity: 1; }
.is-paused .timer { opacity: 0.5; }

/* Kayan Yazı (Marquee) */
.marquee-container { position:absolute; top:80px; width:100%; background:rgba(255,122,0,0.15); border-top:1px solid rgba(255,122,0,0.3); border-bottom:1px solid rgba(255,122,0,0.3); padding:8px 0; overflow:hidden; display:none; }
.marquee-content { display:inline-block; white-space:nowrap; animation:scroll 20s linear infinite; font-size:20px; font-weight:500; color:#ffb74d; }

/* Progress Bar */
.progress-bar-container { position:absolute; bottom:0; left:0; width:100%; height:8px; background:rgba(255,255,255,0.1); }
.progress-bar-fill { height:100%; background:linear-gradient(90deg,#ff7a00,#ffeb3b); width:100%; transition: width 0.5s linear; }

@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-18px);}}
@keyframes scroll{0%{transform:translateX(100vw);}100%{transform:translateX(-100%);}}
@keyframes pulseWarning{0%{transform:scale(1);}50%{transform:scale(1.05); color:#ff0000;}100%{transform:scale(1);}}

.logos{position:absolute;bottom:30px;right:30px;display:flex;gap:15px;}
.logos img{width:65px;height:65px;object-fit:contain;}

.overlay{position:absolute;inset:0;background:rgba(0,0,0,.95);display:none;align-items:center;justify-content:center;flex-direction:column; z-index:100;}
.overlay h1{font-size:80px;color:#ff7a00;font-family:'Bebas Neue',sans-serif; text-shadow: 0 0 50px #ff7a00; animation: float 3s ease-in-out infinite;}

/* Başlangıç Ekranı (Ses yetkisi için) */
#init-screen { position:fixed; inset:0; background:#000; z-index:999; display:flex; justify-content:center; align-items:center; cursor:pointer; }
#init-screen h2 { color:#fff; border: 2px solid #ff7a00; padding: 20px 40px; border-radius: 10px; }
</style>
</head>
<body>

<div id="init-screen" onclick="initSystem()">
    <h2>SİSTEMİ BAŞLAT (TAM EKRAN)</h2>
</div>

<div class="brand">DOU JAM</div>

<div class="marquee-container" id="marquee-box">
    <div class="marquee-content" id="marquee-text">DOU JAM Etkinliğine Hoş Geldiniz!</div>
</div>

<div class="center" id="center">
    <div class="title" id="title">Etkinlik</div>
    <img src="tilki.png" class="fox" id="fox"/>
    <div class="timer" id="timer">00:00:00</div>
    <div class="paused-overlay" id="paused-text">DURAKLATILDI</div>
</div>

<div class="progress-bar-container">
    <div class="progress-bar-fill" id="progress-bar"></div>
</div>

<div class="logos">
    <img src="logo1.png" alt="Logo 1"/>
    <img src="logo2.png" alt="Logo 2"/>
</div>

<div class="overlay" id="overlay">
    <h1>SÜRE BİTTİ!</h1>
</div>

<audio id="sfx-tick" src="tick.mp3" preload="auto"></audio>
<audio id="sfx-finish" src="finish.mp3" preload="auto"></audio>
<audio id="sfx-notify" src="notify.mp3" preload="auto"></audio>

<script>
// FIREBASE CONFIG BURAYA GELECEK
const firebaseConfig = {
    apiKey:"AIzaSyBEXfWs0B3qG5gjswJtvQbgminrBU4XzuE",
    authDomain:"doujam-ed005.firebaseapp.com",
    databaseURL:"https://doujam-ed005-default-rtdb.firebaseio.com",
    projectId:"doujam-ed005"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const ref = db.ref("timerState");

// DOM Elementleri
const timerEl = document.getElementById("timer");
const titleEl = document.getElementById("title");
const overlay = document.getElementById("overlay");
const centerDiv = document.getElementById("center");
const progressBar = document.getElementById("progress-bar");
const marqueeBox = document.getElementById("marquee-box");
const marqueeText = document.getElementById("marquee-text");
const initScreen = document.getElementById("init-screen");

// Ses Elementleri
const sfxTick = document.getElementById("sfx-tick");
const sfxFinish = document.getElementById("sfx-finish");
const sfxNotify = document.getElementById("sfx-notify");

let state = { running: false, endTime: 0, pausedLeft: 0, totalDuration: 0, finished: false };
let lastSecond = -1;
let finishTriggered = false;

// Sistemi yetkilendirme (Tam ekran ve ses izni)
function initSystem() {
    initScreen.style.display = "none";
    if(document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen();
    }
    // Sesleri bir kere boş çaldırıp donduruyoruz (Tarayıcı kilidini açmak için)
    sfxTick.play().then(() => { sfxTick.pause(); sfxTick.currentTime = 0; }).catch(e=>{});
    sfxFinish.play().then(() => { sfxFinish.pause(); sfxFinish.currentTime = 0; }).catch(e=>{});
    sfxNotify.play().then(() => { sfxNotify.pause(); sfxNotify.currentTime = 0; }).catch(e=>{});
}

// Zaman formatlayıcı
function format(ms) {
    if(ms < 0) ms = 0;
    let totalSec = Math.floor(ms / 1000);
    let h = Math.floor(totalSec / 3600);
    let m = Math.floor((totalSec % 3600) / 60);
    let s = totalSec % 60;
    return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
}

// Veritabanını Dinleme (Sadece state değiştiğinde tetiklenir)
ref.on("value", (snap) => {
    const data = snap.val();
    if(!data) return;
    
    // Mesaj bildirimi sesi (Mesaj değiştiyse)
    if(state.message !== data.message && state.message !== undefined && data.showMarquee) {
        sfxNotify.play();
    }

    state = data;
    titleEl.innerText = state.title;
    
    // Marquee Kontrolü
    if(state.showMarquee && state.message) {
        marqueeBox.style.display = "block";
        marqueeText.innerText = state.message;
    } else {
        marqueeBox.style.display = "none";
    }

    // Duraklatıldı UI Kontrolü
    if(!state.running && state.pausedLeft > 0 && !state.finished) {
        document.body.classList.add("is-paused");
    } else {
        document.body.classList.remove("is-paused");
    }

    // Bitiş Ekranı Kontrolü
    if(state.finished) {
        overlay.style.display = "flex";
        if(!finishTriggered) {
            confetti({ particleCount: 150, spread: 180, origin: { y: 0.1 } });
            sfxFinish.play();
            finishTriggered = true;
        }
    } else {
        overlay.style.display = "none";
        finishTriggered = false;
    }
});

// Update Döngüsü (Oyun motoru mantığı - Her frame kendi kendine hesaplar)
function updateLoop() {
    let timeLeftMs = 0;

    if (state.running) {
        timeLeftMs = state.endTime - Date.now();
    } else {
        timeLeftMs = state.pausedLeft;
    }

    if (timeLeftMs < 0) timeLeftMs = 0;

    // Saniye dönümünü yakalama (Tik-Tak sesi için)
    let currentSecond = Math.floor(timeLeftMs / 1000);
    
    if(state.running && currentSecond > 0 && currentSecond <= 10 && currentSecond !== lastSecond) {
        sfxTick.currentTime = 0;
        sfxTick.play();
    }
    lastSecond = currentSecond;

    // Görsel Güncelleme
    timerEl.innerText = format(timeLeftMs);

    // Bitiş Tetikleyicisi (Localden veritabanına sadece bir kez yazar)
    if (state.running && timeLeftMs <= 0 && !state.finished) {
        ref.update({ running: false, finished: true, pausedLeft: 0 });
    }

    // Renk ve Pulse State Geçişleri
    timerEl.className = "timer"; // Reset
    if(currentSecond <= 60 && currentSecond > 0 && state.running) {
        timerEl.classList.add("color-danger", "color-pulse");
    } else if (currentSecond <= 600 && currentSecond > 0) {
        timerEl.classList.add("color-warning");
    }

    // Progress Bar Hesaplama
    if(state.totalDuration > 0) {
        let percent = (timeLeftMs / state.totalDuration) * 100;
        progressBar.style.width = Math.min(100, Math.max(0, percent)) + "%";
    } else {
        progressBar.style.width = "0%";
    }

    requestAnimationFrame(updateLoop);
}

// Döngüyü başlat
requestAnimationFrame(updateLoop);
</script>
</body>
</html>
